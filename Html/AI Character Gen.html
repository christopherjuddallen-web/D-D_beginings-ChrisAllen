<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>D&D Character Generator</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink:        #2c1a0e;
      --ink-light:  #4a3728;
      --gold:       #b8860b;
      --red:        #8b1a1a;
      --parchment:  #f2e8d5;
      --border:     #c4a265;
      --shadow:     rgba(44, 26, 14, 0.25);
    }

    body {
      font-family: 'Lora', Georgia, serif;
      background-color: var(--parchment);
      background-image: url('../parchment-background.svg');
      background-size: cover;
      background-attachment: fixed;
      color: var(--ink);
      min-height: 100vh;
      padding: 40px 20px 60px;
    }

    .page-wrapper {
      max-width: 820px;
      margin: 0 auto;
      background: rgba(242, 232, 213, 0.88);
      border: 2px solid var(--border);
      border-radius: 4px;
      box-shadow: 0 6px 40px var(--shadow), inset 0 0 60px rgba(180,140,80,0.08);
      padding: 52px 64px 60px;
    }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 28px;
      padding: 10px 20px;
      background: var(--red);
      color: var(--parchment);
      font-family: 'Cinzel', serif;
      font-size: .8rem;
      font-weight: 600;
      text-decoration: none;
      border-radius: 4px;
      letter-spacing: 1px;
      transition: background 0.2s;
    }
    .back-btn:hover { background: var(--gold); color: var(--ink); }
    .back-btn::before { content: '←'; font-size: 1rem; }

    .page-title {
      font-family: 'Cinzel', serif;
      font-size: 2rem;
      font-weight: 700;
      color: var(--red);
      text-align: center;
      line-height: 1.3;
      margin-bottom: 10px;
    }

    .page-subtitle {
      text-align: center;
      font-size: 0.95rem;
      color: var(--ink-light);
      font-style: italic;
      margin-bottom: 36px;
      line-height: 1.7;
    }

    .generate-btn {
      display: block;
      margin: 0 auto 40px;
      padding: 14px 40px;
      background: var(--red);
      color: var(--parchment);
      font-family: 'Cinzel', serif;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 1.5px;
      border: 2px solid var(--red);
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.2s, color 0.2s, transform 0.1s;
    }
    .generate-btn:hover { background: var(--gold); border-color: var(--gold); color: var(--ink); transform: translateY(-1px); }
    .generate-btn:active { transform: translateY(0); }

    .character-card {
      display: none;
      background: rgba(232, 213, 176, 0.5);
      border: 2px solid var(--border);
      border-radius: 4px;
      padding: 36px 40px;
      box-shadow: inset 0 0 30px rgba(180,140,80,0.1);
    }
    .character-card.visible { display: block; }

    .character-name {
      font-family: 'Cinzel', serif;
      font-size: 1.7rem;
      font-weight: 700;
      color: var(--red);
      text-align: center;
      margin-bottom: 6px;
    }
    .character-tagline {
      text-align: center;
      font-style: italic;
      color: var(--gold);
      font-size: 0.95rem;
      margin-bottom: 28px;
    }

    .stat-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      margin-bottom: 28px;
    }
    .stat-box {
      background: rgba(242, 232, 213, 0.85);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 12px 10px;
      text-align: center;
    }
    .stat-label {
      font-family: 'Cinzel', serif;
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 4px;
    }
    .stat-value { font-size: 1rem; font-weight: 500; color: var(--ink); }

    .card-section { margin-bottom: 22px; }
    .card-section-title {
      font-family: 'Cinzel', serif;
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--gold);
      border-bottom: 1px solid var(--border);
      padding-bottom: 6px;
      margin-bottom: 10px;
    }
    .card-section p { font-size: 0.95rem; line-height: 1.8; color: var(--ink); margin: 0; }
    .card-section ul { list-style: none; padding: 0; margin: 0; }
    .card-section ul li {
      padding-left: 20px;
      position: relative;
      font-size: 0.92rem;
      line-height: 1.75;
      color: var(--ink-light);
      font-style: italic;
    }
    .card-section ul li::before {
      content: '⚔';
      position: absolute;
      left: 0;
      color: var(--gold);
      font-style: normal;
      font-size: 0.75rem;
      top: 4px;
    }

    .tip-box {
      background: rgba(139, 26, 26, 0.06);
      border-left: 4px solid var(--red);
      border-radius: 0 4px 4px 0;
      padding: 16px 20px;
      margin-top: 28px;
    }
    .tip-box p { font-size: 0.88rem; font-style: italic; color: var(--ink-light); line-height: 1.75; margin: 0; }
    .tip-box strong {
      font-style: normal;
      color: var(--red);
      font-family: 'Cinzel', serif;
      font-size: 0.78rem;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    @media (max-width: 600px) {
      .page-wrapper { padding: 32px 24px 40px; }
      .page-title { font-size: 1.45rem; }
      .stat-grid { grid-template-columns: repeat(2, 1fr); }
      .character-card { padding: 24px 20px; }
    }
  </style>
</head>
<body>
<div class="page-wrapper">

  <a href="../index.html" class="back-btn">Back to Home</a>

  <h1 class="page-title">Your First Character Awaits</h1>
  <p class="page-subtitle">
    Not sure where to start? Let fate decide. Click the button below and<br>
    the scroll will reveal a character built just for your first adventure.
  </p>

  <button class="generate-btn" onclick="generateCharacter()">✦ Roll My Character ✦</button>

  <div class="character-card" id="characterCard">
    <div class="character-name" id="charName"></div>
    <div class="character-tagline" id="charTagline"></div>
    <div class="stat-grid">
      <div class="stat-box"><div class="stat-label">Race</div><div class="stat-value" id="statRace"></div></div>
      <div class="stat-box"><div class="stat-label">Class</div><div class="stat-value" id="statClass"></div></div>
      <div class="stat-box"><div class="stat-label">Background</div><div class="stat-value" id="statBackground"></div></div>
      <div class="stat-box"><div class="stat-label">Alignment</div><div class="stat-value" id="statAlignment"></div></div>
      <div class="stat-box"><div class="stat-label">Age</div><div class="stat-value" id="statAge"></div></div>
      <div class="stat-box"><div class="stat-label">Weapon</div><div class="stat-value" id="statWeapon"></div></div>
    </div>
    <div class="card-section">
      <div class="card-section-title">Backstory</div>
      <p id="charBackstory"></p>
    </div>
    <div class="card-section">
      <div class="card-section-title">Personality</div>
      <p id="charPersonality"></p>
    </div>
    <div class="card-section">
      <div class="card-section-title">Notable Abilities</div>
      <ul id="charAbilities"></ul>
    </div>
    <div class="tip-box">
      <p><strong>Beginner Tip:</strong> <span id="charTip"></span></p>
    </div>
  </div>

</div>
<script>
  const data = {
    firstNames: ["Aldric","Seraphina","Torvin","Lirien","Brom","Zara","Fenwick","Isolde","Dax","Mirela","Gruff","Tessara","Orin","Vael","Cynder","Hadric","Nessa","Pyke","Elara","Thorne"],
    lastNames:  ["Stonehammer","Nightwhisper","Ironfoot","Dawnblade","Ashwood","Coldwater","Grimtooth","Silverleaf","Blackthorn","Emberveil","Stormcloak","Holloway","Dunmore","Swiftarrow","Cragheart"],
    races:       ["Human","Elf","Dwarf","Halfling","Gnome","Half-Orc","Tiefling","Dragonborn"],
    classes:     ["Fighter","Wizard","Rogue","Cleric","Ranger","Bard","Paladin","Barbarian"],
    backgrounds: ["Soldier","Sage","Criminal","Folk Hero","Noble","Outlander","Acolyte","Entertainer"],
    alignments:  ["Lawful Good","Neutral Good","Chaotic Good","Lawful Neutral","True Neutral","Chaotic Neutral"],
    weapons:     ["Longsword","Staff","Twin Daggers","Warhammer","Shortbow","Rapier","Greataxe","Hand Crossbow"],

    taglines: {
      Fighter:   ["A battle-hardened warrior who lets their sword do the talking.","Born on the battlefield, forged in steel."],
      Wizard:    ["A bookish spellcaster with a spell for every problem.","Knowledge is power — and power is fireballs."],
      Rogue:     ["Quick hands, quicker exits, questionable morals.","If they didn't see it, did it really happen?"],
      Cleric:    ["A devoted servant of the gods who heals first, asks questions later.","Faith and a mace — a dangerous combination."],
      Ranger:    ["A wanderer of the wilds who never misses twice.","The forest is home — everywhere else is a dungeon."],
      Bard:      ["A charming storyteller who fights with words and the occasional lute.","Every problem can be solved with a good song."],
      Paladin:   ["A righteous warrior sworn to protect the innocent.","Honour-bound, shield raised, ready for anything."],
      Barbarian: ["A fierce warrior who channels raw rage into unstoppable force.","Diplomacy? Never heard of it."]
    },

    backstories: {
      Fighter:   ["You grew up training under a retired knight who saw potential in you. After your village was threatened by bandits, you drove them off single-handedly — and never looked back.","Once a guard for a corrupt nobleman, you quit when ordered to do something you knew was wrong. Now you sell your sword arm to causes worth fighting for."],
      Wizard:    ["You spent years in a dusty library studying ancient spells, until one accidentally opened a portal in your bedroom. Adventure found you whether you wanted it or not.","Your mentor vanished without warning, leaving only a cryptic note and a spellbook. You have been searching for answers ever since."],
      Rogue:     ["You grew up on the streets, learning early that the world doesn't hand you anything. You're not proud of everything you've done, but you're proud of still being alive.","You used to work for a thieves' guild until a job went sideways. Now you freelance — on your own terms."],
      Cleric:    ["A divine vision came to you during a fever dream, and when you woke up you could heal wounds with a touch. Your temple sent you into the world to do good works.","You never expected to be chosen by a god. But when the miracles started happening, it was hard to argue with."],
      Ranger:    ["You tracked a dangerous beast for three weeks through the wilderness before finally bringing it down. That hunt taught you everything about patience and survival.","Your community relied on you to keep the forest safe. A darkness crept in that you couldn't handle alone — so you went looking for help."],
      Bard:      ["You've been performing in taverns since you were old enough to hold a lute. You've heard a thousand stories — now you want to live one worth telling.","You stumbled across a legendary instrument said to be blessed by a muse. Since picking it up, your music has had a strange effect on people."],
      Paladin:   ["You took a sacred oath at the age of sixteen and have never once broken it. Some call you idealistic — you call it having standards.","A great injustice was done to your family, and the law did nothing. You swore to be the protection others couldn't find."],
      Barbarian: ["You come from a proud warrior clan in the northern mountains. When a rival tribe destroyed your home, you set out to find allies and return stronger.","Your rage isn't just anger — it's something ancient that lives inside you. You don't fully understand it, but in battle, it makes you unstoppable."]
    },

    personalities: {
      Fighter:   "Straightforward and dependable, you say what you mean and back it up with action. You have little patience for games or deception.",
      Wizard:    "Endlessly curious and slightly absent-minded, you'd rather be reading than fighting — but you're devastatingly effective when pushed.",
      Rogue:     "Charming on the surface but hard to truly know, you keep your cards close. You trust actions over words — especially your own.",
      Cleric:    "Warm and compassionate, you genuinely care about the people around you. Your faith isn't blind — you ask hard questions and expect honest answers.",
      Ranger:    "Quiet and observant, you often know more than you let on. You prefer animals to most people, but you're fiercely loyal to those you trust.",
      Bard:      "Sociable and quick-witted, you can talk your way into — and out of — almost anything. You're the first to lighten the mood and the last to back down from a good story.",
      Paladin:   "Principled and direct, you hold yourself to a high standard and lead others by example. Not preachy — just consistent.",
      Barbarian: "Big-hearted and surprisingly funny once people get past the intimidating exterior. You fight fiercely for those you love and ask nothing in return."
    },

    abilities: {
      Fighter:   ["Second Wind — regain hit points in a pinch","Action Surge — take an extra action in a crucial moment","Fighting Style — specialised in your chosen weapon or shield"],
      Wizard:    ["Spellcasting — cast from a large list of powerful spells","Arcane Recovery — regain spell slots after a short rest","Spell Mastery — eventually cast certain spells at will"],
      Rogue:     ["Sneak Attack — massive bonus damage when the odds are in your favour","Cunning Action — bonus action to dash, disengage, or hide","Expertise — doubly proficient in your two best skills"],
      Cleric:    ["Spellcasting — divine spells including powerful healing magic","Turn Undead — frighten or destroy undead enemies","Channel Divinity — powerful abilities powered by your faith"],
      Ranger:    ["Favoured Enemy — extra bonuses against a chosen creature type","Natural Explorer — unmatched in wilderness survival and navigation","Spellcasting — nature magic to aid tracking and survival"],
      Bard:      ["Spellcasting — a versatile mix of buffs, debuffs, and damage","Bardic Inspiration — give teammates a bonus die with a performance","Jack of All Trades — a small bonus to literally every skill"],
      Paladin:   ["Divine Smite — channel radiant energy into devastating strikes","Lay on Hands — heal allies or cure disease with a touch","Aura of Protection — your presence boosts your whole party's defences"],
      Barbarian: ["Rage — enter a fearsome frenzy for extra damage and damage resistance","Unarmoured Defence — your physical toughness is armour enough","Reckless Attack — strike with wild abandon for near-guaranteed hits"]
    },

    tips: {
      Fighter:   "Fighters are perfect for beginners — no spell slots to track. Focus on positioning yourself between enemies and your teammates to protect them.",
      Wizard:    "Start simple — pick two or three spells you understand well. Firebolt is your reliable ranged attack and doesn't cost spell slots.",
      Rogue:     "Try to attack with advantage whenever possible — flanking an enemy or striking a surprised foe triggers Sneak Attack for huge bonus damage.",
      Cleric:    "You don't need to heal every single turn! Clerics are great fighters too. Save healing spells for emergencies and use cantrips the rest of the time.",
      Ranger:    "Use the environment to your advantage — high ground, cover, and chokepoints are your best friends. You shine when you control the battlefield.",
      Bard:      "Don't underestimate Bardic Inspiration. Handing a bonus die to a teammate at just the right moment can completely change the outcome of a fight.",
      Paladin:   "Save your Divine Smite for when you really need it — like a tough boss. Spending all your spell slots in the first fight is the most common beginner mistake.",
      Barbarian: "Remember to actually Rage at the start of combat! It's easy to forget when things get hectic, but the damage resistance alone can keep you alive."
    }
  };

  function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

  function generateCharacter() {
    const charClass = pick(data.classes);
    const name = pick(data.firstNames) + " " + pick(data.lastNames);
    const age  = Math.floor(Math.random() * 30) + 18;

    document.getElementById('charName').textContent        = name;
    document.getElementById('charTagline').textContent     = pick(data.taglines[charClass]);
    document.getElementById('statRace').textContent        = pick(data.races);
    document.getElementById('statClass').textContent       = charClass;
    document.getElementById('statBackground').textContent  = pick(data.backgrounds);
    document.getElementById('statAlignment').textContent   = pick(data.alignments);
    document.getElementById('statAge').textContent         = age;
    document.getElementById('statWeapon').textContent      = pick(data.weapons);
    document.getElementById('charBackstory').textContent   = pick(data.backstories[charClass]);
    document.getElementById('charPersonality').textContent = data.personalities[charClass];
    document.getElementById('charTip').textContent         = data.tips[charClass];

    const ul = document.getElementById('charAbilities');
    ul.innerHTML = '';
    data.abilities[charClass].forEach(a => {
      const li = document.createElement('li');
      li.textContent = a;
      ul.appendChild(li);
    });

    document.getElementById('characterCard').classList.add('visible');
  }
</script>
</body>
</html>
